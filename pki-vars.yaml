# ── PKI SETTINGS ────────────────────────────────────────────────────────────

# Certificate Authority Subject Identity
ca_name: Certificate Authority
cert_country: US
cert_province: DC
cert_city: Washington
cert_org: Internal
cert_ou: Private

# Root CA Key Parameters
cert_root_key_type: rsa          # rsa | ec | ed25519
cert_root_key_param: '4096'      # RSA: 2048/3072/4096 | EC: P-256/P-384/P-521 | Ed25519: (ignored)
cert_root_digest: sha512         # sha256 | sha384 | sha512
cert_root_ca_days: 7300

# Intermediate CA Key Parameters
cert_intermediate_key_type: rsa
cert_intermediate_key_param: '4096'
cert_intermediate_digest: sha512
cert_intermediate_days: 5475

# Default Leaf Certificate Validity
cert_service_days: 5475
